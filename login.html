<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MystIQ Escape - Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page-body">

<div class="login-top-logo">
    <a href="index.html" class="logo-link">
        <img src="./img/logo.png" alt="MystIQ Escape logo">
    </a>
</div>

<main class="login-page">
    <section class="login-panel">
        <div class="login-panel-content">
            <p class="eyebrow">Member Access</p>
            <h1>Unlock the next escape</h1>
            <p class="login-copy">Sign in to continue your mystery journey, manage bookings, and discover exclusive room updates.</p>

            <form class="login-form">
                <input type="email" placeholder="Email address" required>
                <div class="password-field">
                    <input type="password" id="loginPassword" placeholder="Password" required>
                    <button type="button" class="password-toggle" aria-label="Show password" onclick="togglePasswordVisibility()">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
                <div class="login-options">
                    <label class="remember-me">
                        <input type="checkbox">
                        <span>Remember me</span>
                    </label>
                    <a href="#" class="forgot-password">Forgot password?</a>
                </div>
                <button type="submit" class="btn login-submit">Login</button>
            </form>

            <div class="login-divider">
                <span>or continue with</span>
            </div>

            <div class="login-socials">
                <a href="#" class="login-social-btn" aria-label="Login with Facebook"><i class="fab fa-facebook-f"></i></a>
                <a href="#" class="login-social-btn" aria-label="Login with Instagram"><i class="fab fa-instagram"></i></a>
                <a href="#" class="login-social-btn" aria-label="Login with Twitter"><i class="fab fa-twitter"></i></a>
                <a href="#" class="login-social-btn" aria-label="Login with Apple"><i class="fab fa-apple"></i></a>
            </div>
        </div>

        <div class="login-side-visual">
            <img src="./img/login-visual.jpg" alt="MystIQ Escape login visual">
        </div>
    </section>
</main>

<script src="js/script.js"></script>
</body>
</html>
